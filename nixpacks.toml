# Build the Vite SPA and serve the compiled dist/ folder with Caddy.
#
# Do NOT list "caddy" in [phases.setup]. Nixpacks' Node SPA provider
# auto-detects this app (vite + react) and injects its OWN caddy phase,
# pinned to a different nixpkgs archive (caddy 2.8.4). Declaring caddy here
# too pulls a second caddy (2.10.2); nix-env cannot place two versions of
# the same package in one profile and aborts with a file conflict on
# lib/systemd/system/caddy-api.service (exit 100). Letting the auto-phase be
# the SOLE caddy source removes the conflict while still putting the caddy
# binary on PATH for [start].
#
# History (do not regress):
#  - Node must be >=20 for @tailwindcss/oxide native binding (Node 18 failed).
#  - Caddy must serve dist/, not the project root, or the browser gets the
#    source index.html (/src/main.tsx) -> "MIME type ''" module error.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = ["npm ci"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

# Our [start] overrides the auto-generated one (file plan wins on merge), so
# OUR /app/Caddyfile (serving dist/) is used instead of the generated
# /assets/Caddyfile. The auto-caddy phase is still what installs the binary.
[start]
cmd = "caddy run --config /app/Caddyfile --adapter caddyfile 2>&1"
